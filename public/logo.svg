<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="SquadSort">
  <defs>
    <path id="ss-jersey" d="M36 8 L20 16 L3 28 L11 46 L26 37 L26 97 L74 97 L74 37 L89 46 L97 28 L80 16 L64 8 Q50 24 36 8 Z"/>
    <linearGradient id="ss-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16161c"/>
      <stop offset="1" stop-color="#0b0b0e"/>
    </linearGradient>
    <filter id="ss-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" fill="url(#ss-bg)"/>

  <!-- Overlapping kit jerseys: red (back-left), white (right), black hero (front, neon) -->
  <g stroke-linejoin="round">
    <g fill="#e5352b" stroke="#2a0f0d" stroke-width="1.6"
       transform="translate(160 276) rotate(-16) scale(1.85) translate(-50 -50)">
      <use href="#ss-jersey"/>
    </g>
    <g fill="#f5f5f5" stroke="#26262b" stroke-width="1.6"
       transform="translate(352 276) rotate(16) scale(1.85) translate(-50 -50)">
      <use href="#ss-jersey"/>
    </g>
    <g fill="#0f0f13" stroke="#00ff87" stroke-width="2" filter="url(#ss-glow)"
       transform="translate(256 242) scale(1.98) translate(-50 -50)">
      <use href="#ss-jersey"/>
    </g>
  </g>

  <!-- Neon frame -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="none"
        stroke="#00ff87" stroke-width="9" opacity="0.9" filter="url(#ss-glow)"/>
</svg>
